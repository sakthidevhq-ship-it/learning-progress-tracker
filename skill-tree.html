<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skill Tree</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body { background: #0a0c10; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }

#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10; height: 44px;
  background: rgba(10,12,16,0.9); backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex; align-items: center; padding: 0 20px; gap: 14px;
}
#hud .brand { font-size: 13px; font-weight: 700; color: #e6edf3; letter-spacing: 0.5px; }
#hud .crumb { font-size: 11px; color: rgba(255,255,255,0.35); }
#hud .crumb b { color: rgba(255,255,255,0.7); font-weight: 600; }
#hud .crumb .back { cursor: pointer; color: rgba(88,166,255,0.8); }
.hsep { width: 1px; height: 16px; background: rgba(255,255,255,0.06); }
#hud input, #hud select {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  color: #8b949e; border-radius: 6px; padding: 4px 8px;
  font-size: 10px; font-family: inherit; outline: none;
}
.legend { margin-left: auto; display: flex; gap: 12px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.5px; }
.ldot { width: 8px; height: 8px; border-radius: 2px; }

#sheet {
  position: fixed; top: 44px; left: 0; bottom: 0; width: 272px; z-index: 15;
  background: rgba(11,13,18,0.92); backdrop-filter: blur(20px);
  border-right: 1px solid rgba(255,255,255,0.05);
  overflow-y: auto; padding: 18px 16px 30px;
  font-family: 'Inter', system-ui, sans-serif; color: #c9d1d9;
}
#sheet::-webkit-scrollbar { width: 4px; }
#sheet::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.lvl-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
.lvl-num { font-size: 30px; font-weight: 800; color: #e3b341; line-height: 1; }
.lvl-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); }
.lvl-total { margin-left: auto; font-size: 10px; color: rgba(255,255,255,0.3); }
.lvl-total b { color: rgba(227,179,65,0.9); }
.xpbar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.05); overflow: hidden; margin-bottom: 4px; }
.xpbar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #e3b341, #f0883e); }
.xp-hint { font-size: 9px; color: rgba(255,255,255,0.25); margin-bottom: 4px; }

.sheet-sec { margin-top: 18px; }
.sheet-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.28); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.sheet-title .cnt { color: rgba(255,255,255,0.18); font-weight: 500; }
.sheet-title .clear { margin-left: auto; cursor: pointer; color: rgba(255,255,255,0.25); font-size: 9px; text-transform: none; letter-spacing: 0; }
.sheet-title .clear:hover { color: rgba(255,255,255,0.5); }

.quest {
  border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
  padding: 9px 11px; margin-bottom: 7px; cursor: pointer;
  background: rgba(255,255,255,0.015); transition: all 0.12s;
}
.quest:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.14); }
.quest .q-kind { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
.quest .q-title { font-size: 11.5px; font-weight: 600; color: #dde3ea; line-height: 1.35; margin-bottom: 4px; }
.quest .q-meta { font-size: 9px; color: rgba(255,255,255,0.3); display: flex; gap: 8px; flex-wrap: wrap; }
.quest .q-xp { color: #e3b341; font-weight: 600; }
.quest.q-continue { border-color: rgba(240,136,62,0.25); }
.quest.q-continue .q-kind { color: #f0883e; }
.quest.q-new .q-kind { color: #58a6ff; }
.quest.q-unlock { border-color: rgba(163,113,247,0.22); }
.quest.q-unlock .q-kind { color: #a371f7; }
.qbar { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.05); margin-top: 5px; overflow: hidden; }
.qbar-fill { height: 100%; background: #f0883e; border-radius: 2px; }

/* Goal card */
.goal-card {
  border: 1px solid rgba(227,179,65,0.35); border-radius: 10px;
  padding: 10px 12px; margin-bottom: 7px;
  background: rgba(227,179,65,0.05);
}
.goal-card .g-title { font-size: 12px; font-weight: 700; color: #e3b341; margin-bottom: 3px; }
.goal-card .g-meta { font-size: 9px; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
.goal-step { display: flex; align-items: center; gap: 7px; padding: 3px 0; font-size: 10.5px; cursor: pointer; border-radius: 5px; }
.goal-step:hover { background: rgba(255,255,255,0.03); }
.goal-step .gs-n { font-size: 8px; color: rgba(227,179,65,0.6); font-weight: 700; width: 14px; text-align: right; flex-shrink: 0; }
.goal-step .gs-t { color: rgba(255,255,255,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.goal-step.gs-done .gs-t { color: rgba(63,185,80,0.6); text-decoration: line-through; }
.goal-step.gs-next .gs-t { color: #e6edf3; font-weight: 600; }

.rank-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; padding: 2px 4px; border-radius: 6px; }
.rank-row:hover { background: rgba(255,255,255,0.03); }
.rank-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.rank-name { font-size: 10.5px; color: rgba(255,255,255,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.rank-title { font-size: 8px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.rank-frac { font-size: 9px; color: rgba(255,255,255,0.22); width: 34px; text-align: right; }

.ach-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.ach {
  width: 42px; height: 42px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: default;
  background: rgba(227,179,65,0.08); border: 1px solid rgba(227,179,65,0.3);
}
.ach.locked { background: rgba(255,255,255,0.015); border-color: rgba(255,255,255,0.05); filter: grayscale(1); opacity: 0.3; }

#tip {
  position: fixed; z-index: 30; pointer-events: none; display: none;
  background: rgba(16,20,28,0.95); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 10px 14px; max-width: 280px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  font-family: 'Inter', system-ui, sans-serif; color: #c9d1d9;
}
#tip h3 { font-size: 12px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
#tip .meta { font-size: 9px; color: rgba(255,255,255,0.25); }
#tip .meta .xp { color: #e3b341; font-weight: 600; }

#panel {
  position: fixed; top: 44px; right: 0; bottom: 0; width: 360px; z-index: 20;
  background: rgba(13,17,23,0.97); border-left: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  transform: translateX(100%); transition: transform 0.2s ease;
  overflow-y: auto; padding: 24px;
  font-family: 'Inter', system-ui, sans-serif; color: #c9d1d9;
  user-select: text;
}
#panel.open { transform: translateX(0); }
#panel .close-btn {
  position: absolute; top: 14px; right: 14px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.4); font-size: 13px; cursor: pointer;
  width: 26px; height: 26px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
#panel .close-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
#panel h3 { font-size: 16px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; padding-right: 34px; }
#panel .pills { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
#panel .pill { font-size: 9px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.4px; }
#panel .pill.xp { color: #e3b341; background: rgba(227,179,65,0.08); }
#panel .goal-btn {
  display: inline-block; margin-bottom: 12px; cursor: pointer;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  color: #e3b341; background: rgba(227,179,65,0.08);
  border: 1px solid rgba(227,179,65,0.35); border-radius: 14px; padding: 5px 14px;
  font-family: inherit;
}
#panel .goal-btn:hover { background: rgba(227,179,65,0.15); }
#panel .info { font-size: 12px; color: rgba(255,255,255,0.35); margin: 3px 0; line-height: 1.5; }
#panel .info b { color: rgba(255,255,255,0.6); font-weight: 500; }
#panel .pbar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.04); margin-top: 8px; overflow: hidden; }
#panel .pfill { height: 100%; border-radius: 2px; }
#panel .section { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.04); }
#panel .section-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px; color: rgba(255,255,255,0.2); margin-bottom: 5px; }
#panel .concept-list { font-size: 12px; color: rgba(255,255,255,0.3); line-height: 1.7; }
#panel .concept-known { color: rgba(63,185,80,0.7); }
#panel .concept-gap { color: rgba(240,136,62,0.7); }
#panel .sum { font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.04); line-height: 1.55; }

canvas { display: block; cursor: grab; }
canvas.grabbing { cursor: grabbing; }
</style>
</head>
<body>
<div id="hud">
  <div class="brand">SKILL TREE</div>
  <div class="hsep"></div>
  <div class="crumb" id="crumb"></div>
  <select id="domainFilter"><option value="">⤷ Enter branch…</option></select>
  <input id="search" type="text" placeholder="Search..." style="width:120px"/>
  <a href="knowledge-graph.html" style="font-size:10px;color:rgba(88,166,255,0.7);text-decoration:none;border:1px solid rgba(88,166,255,0.25);border-radius:14px;padding:3px 10px;white-space:nowrap">◉ Map</a>
  <div class="legend">
    <div class="legend-item"><div class="ldot" style="background:#3fb950"></div>Unlocked</div>
    <div class="legend-item"><div class="ldot" style="background:#f0883e"></div>Learning</div>
    <div class="legend-item"><div class="ldot" style="background:#58a6ff"></div>Available</div>
    <div class="legend-item"><div class="ldot" style="background:rgba(255,255,255,0.08)"></div>Locked</div>
  </div>
</div>
<div id="sheet"></div>
<div id="tip"></div>
<div id="panel"></div>
<canvas id="c"></canvas>

<script>
const RAW = VAULT_PLACEHOLDER;

const RES_TYPES = new Set(['paper','article','video','docs','tweet']);
function plinks(v) { return v ? (v.match(/\[\[([^\]]+)\]\]/g)||[]).map(s=>s.slice(2,-2)) : []; }
function strip(v) { return (v||'').replace(/\[\[|\]\]/g,''); }

const resources = RAW.filter(n => RES_TYPES.has(n.type)).map(n => ({
  ...n, domain: strip(n.domain) || 'Other', topic: strip(n.topic),
  prereqs: plinks(n.prerequisites), concepts: plinks(n.concepts),
  prereqResources: n.prereqResources || [],
  pri: parseInt(n.priority)||0, prog: parseInt(n.progress)||0,
  lvl: (typeof n.level === 'number') ? n.level : parseFloat(n.level) || 0,
}));

const titleToIdx = {};
resources.forEach((n, i) => titleToIdx[n.title] = i);
const completed = new Set(resources.filter(n => n.status==='completed').map(n => n.title));

resources.forEach(n => {
  const pr = n.prereqResources;
  n._cov = pr.length === 0 ? 1 : pr.filter(t => completed.has(t)).length / pr.length;
  if (n.status === 'completed') { n._st = 'done'; n._cov = 1; }
  else if (n.status === 'in-progress') { n._st = 'progress'; }
  else n._st = n._cov >= 0.5 ? 'ready' : 'blocked';
});

const edges = [];
resources.forEach((n, ti) => {
  for (const pt of n.prereqResources) {
    const fi = titleToIdx[pt];
    if (fi !== undefined) edges.push({ from: fi, to: ti });
  }
});

// --- XP economy ---
const CPLX_XP = { beginner: 50, intermediate: 100, advanced: 150 };
const SIZE_MUL = { 'quick-read': 0.6, medium: 1, 'deep-dive': 1.5 };
function xpOf(n) {
  const base = CPLX_XP[n.complexity] || 100;
  const mul = SIZE_MUL[n.size] || 1;
  return Math.round(base * mul / 5) * 5;
}
resources.forEach(n => n._xp = xpOf(n));

const earnedXP = resources.reduce((s, n) => {
  if (n._st === 'done') return s + n._xp;
  if (n._st === 'progress') return s + Math.floor(n._xp * n.prog / 100 / 5) * 5;
  return s;
}, 0);
function levelFromXP(xp) {
  let lvl = 1, need = 200, cum = 0;
  while (xp >= cum + need) { cum += need; need = Math.round(need * 1.25 / 5) * 5; lvl++; }
  return { lvl, into: xp - cum, need };
}
const LV = levelFromXP(earnedXP);

function rankOf(frac) {
  if (frac >= 1) return { t: 'GRANDMASTER', c: '#e3b341' };
  if (frac >= 0.75) return { t: 'MASTER', c: '#f0883e' };
  if (frac >= 0.5) return { t: 'EXPERT', c: '#a371f7' };
  if (frac >= 0.25) return { t: 'ADEPT', c: '#58a6ff' };
  if (frac > 0) return { t: 'NOVICE', c: '#3fb950' };
  return { t: 'UNEXPLORED', c: 'rgba(255,255,255,0.18)' };
}

const unlockCount = new Array(resources.length).fill(0);
edges.forEach(e => unlockCount[e.from]++);
function questScore(n, i) { return n.pri + unlockCount[i]*8 + n._cov*10; }

const continueQ = resources.map((n,i)=>({n,i})).filter(q => q.n._st==='progress')
  .sort((a,b) => b.n.prog - a.n.prog);
const newQ = resources.map((n,i)=>({n,i})).filter(q => q.n._st==='ready')
  .sort((a,b) => questScore(b.n,b.i) - questScore(a.n,a.i)).slice(0, 4);
let unlockQ = null;
{
  const cands = resources.map((n,i)=>({n,i})).filter(q => q.n._st==='blocked')
    .map(q => ({ ...q, missing: q.n.prereqResources.filter(t => !completed.has(t)) }))
    .filter(q => q.missing.length === 1)
    .filter(q => {
      const m = resources[titleToIdx[q.missing[0]]];
      return m && (m._st === 'ready' || m._st === 'progress');
    })
    .sort((a,b) => b.n.pri - a.n.pri);
  if (cands.length) {
    const t = cands[0];
    unlockQ = { finish: resources[titleToIdx[t.missing[0]]], finishIdx: titleToIdx[t.missing[0]], opens: t.n };
  }
}
const topPickIdx = continueQ.length ? continueQ[0].i : (newQ.length ? newQ[0].i : -1);

const doneRes = resources.filter(n => n._st === 'done');
const domStats = {};
resources.forEach(n => {
  const d = n.domain;
  domStats[d] = domStats[d] || { total: 0, done: 0, prog: 0 };
  domStats[d].total++;
  if (n._st === 'done') domStats[d].done++;
  if (n._st === 'progress') domStats[d].prog++;
});
const branchFracs = Object.values(domStats).map(s => s.done / s.total);
const ACH = [
  { icon: '🥇', name: 'First Steps', desc: 'Complete your first resource', ok: doneRes.length >= 1 },
  { icon: '📚', name: 'Getting Serious', desc: 'Complete 5 resources', ok: doneRes.length >= 5 },
  { icon: '🔟', name: 'Double Digits', desc: 'Complete 10 resources', ok: doneRes.length >= 10 },
  { icon: '📄', name: 'Scholar', desc: 'Complete 3 papers', ok: doneRes.filter(n => n.type==='paper').length >= 3 },
  { icon: '🧠', name: 'Pioneer', desc: 'Complete an advanced resource', ok: doneRes.some(n => n.complexity==='advanced') },
  { icon: '🤿', name: 'Deep Diver', desc: 'Complete a deep-dive', ok: doneRes.some(n => n.size==='deep-dive') },
  { icon: '🛠', name: 'Builder', desc: 'Complete an implement-type resource', ok: doneRes.some(n => n.engagement==='implement') },
  { icon: '🌍', name: 'Polymath', desc: 'Complete resources in 3+ branches', ok: new Set(doneRes.map(n=>n.domain)).size >= 3 },
  { icon: '🌱', name: 'Branch Adept', desc: 'Reach 25% in any branch', ok: branchFracs.some(f => f >= 0.25) },
  { icon: '⚔️', name: 'Branch Expert', desc: 'Reach 50% in any branch', ok: branchFracs.some(f => f >= 0.5) },
  { icon: '👑', name: 'Branch Master', desc: 'Reach 75% in any branch', ok: branchFracs.some(f => f >= 0.75) },
  { icon: '💎', name: 'Completionist', desc: 'Finish an entire branch', ok: branchFracs.some(f => f >= 1) },
];

const DOMAIN_THEMES = {
  'ML/Infrastructure': { c: [56,139,253],  name: 'ML Infrastructure' },
  'ML/Agents':         { c: [63,185,160],  name: 'ML Agents' },
  'ML/Frameworks':     { c: [163,113,247], name: 'ML Frameworks' },
  'ML/Foundations':    { c: [80,160,240],  name: 'ML Foundations' },
  'ML/Voice':          { c: [200,100,180], name: 'Voice AI' },
  'Game AI':           { c: [240,176,62],  name: 'Game AI' },
  'Systems':           { c: [80,190,210],  name: 'Systems' },
  'Networking':        { c: [150,100,220], name: 'Networking' },
  'Programming/Rust':  { c: [222,110,50],  name: 'Rust' },
  'Programming/Zig':   { c: [240,180,60],  name: 'Zig' },
  'Programming/Python':{ c: [220,200,60],  name: 'Python' },
  'Programming/Compilers':{ c: [180,200,80], name: 'Compilers' },
  'Embedded/Gaming':   { c: [200,140,80],  name: 'Embedded' },
  'Mindset':           { c: [220,80,120],  name: 'Mindset' },
};
function domTheme(d) { return DOMAIN_THEMES[d] || { c: [140,140,140], name: d || 'Other' }; }

const SC = {
  done:     { fill: '#3fb950', glow: [63,185,80],  text: '#3fb950' },
  progress: { fill: '#f0883e', glow: [240,136,62], text: '#f0883e' },
  ready:    { fill: '#58a6ff', glow: [88,166,255], text: '#58a6ff' },
  blocked:  { fill: 'rgba(255,255,255,0.08)', glow: null, text: 'rgba(255,255,255,0.25)' },
};

// ============================================================
// TWO-LEVEL META-TREE
// Galaxy: 14 branch orbs (honest aggregates — no cycles, no hubs)
// Branch: zoom into one domain's resources (local order tolerable)
// Goal paths: the verb that works at both levels
// ============================================================

const SIDEBAR_W = 272;
let view = { mode: 'galaxy', domain: null };
let goal = null; // { target, set:Set<idx>, order:[idx] }
let galaxySats = []; // quest-path satellites materialized on the galaxy

// --- Galaxy layout: deterministic force sim on domain orbs ---
const galaxyNodes = []; // {domain, x, y, r, count, done}
function layoutGalaxy(W, H) {
  const doms = Object.keys(domStats).sort((a,b) => domStats[b].total - domStats[a].total);
  // Symmetric inter-domain weights from cross edges
  const wmap = {};
  edges.forEach(e => {
    const a = resources[e.from].domain, b = resources[e.to].domain;
    if (a === b) return;
    const key = a < b ? a+'|'+b : b+'|'+a;
    wmap[key] = (wmap[key]||0) + 1;
  });
  galaxyNodes.length = 0;
  const cx = (W - SIDEBAR_W)/2 + SIDEBAR_W, cy = (H - 44)/2 + 44;
  doms.forEach((d, i) => {
    const s = domStats[d];
    const r = 30 + Math.sqrt(s.total) * 9;
    // deterministic seed on a circle, biggest at center
    const angle = (2*Math.PI*i)/doms.length - Math.PI/2;
    const dist = i === 0 ? 0 : 250 + (i%3)*60;
    galaxyNodes.push({ domain: d, x: cx + dist*Math.cos(angle), y: cy + dist*Math.sin(angle), vx:0, vy:0, r, ...s });
  });
  const byDom = {};
  galaxyNodes.forEach(g => byDom[g.domain] = g);
  // Force sim: attraction along weighted pairs, repulsion, center gravity
  for (let it = 0; it < 300; it++) {
    const alpha = 1 - it/300;
    galaxyNodes.forEach(g => { g.vx += (cx-g.x)*0.002*alpha; g.vy += (cy-g.y)*0.002*alpha; });
    for (let i = 0; i < galaxyNodes.length; i++) {
      for (let j = i+1; j < galaxyNodes.length; j++) {
        const a = galaxyNodes[i], b = galaxyNodes[j];
        let dx = b.x-a.x, dy = b.y-a.y;
        let dist = Math.sqrt(dx*dx+dy*dy)||1;
        const minD = a.r + b.r + 60;
        if (dist < minD*1.8) {
          const f = (minD*minD)/(dist*dist)*1.6*alpha;
          a.vx -= dx/dist*f; a.vy -= dy/dist*f;
          b.vx += dx/dist*f; b.vy += dy/dist*f;
        }
      }
    }
    for (const [key, w] of Object.entries(wmap)) {
      const [da, db] = key.split('|');
      const a = byDom[da], b = byDom[db];
      if (!a || !b) continue;
      let dx = b.x-a.x, dy = b.y-a.y;
      let dist = Math.sqrt(dx*dx+dy*dy)||1;
      const ideal = a.r + b.r + 90;
      const f = (dist-ideal)*0.004*Math.min(w/6,1)*alpha;
      a.vx += dx/dist*f; a.vy += dy/dist*f;
      b.vx -= dx/dist*f; b.vy -= dy/dist*f;
    }
    galaxyNodes.forEach(g => { g.vx*=0.8; g.vy*=0.8; g.x+=g.vx; g.y+=g.vy; });
  }
  // Aggregated arcs for drawing
  galaxyArcs.length = 0;
  for (const [key, w] of Object.entries(wmap)) {
    if (w < 2) continue;
    const [da, db] = key.split('|');
    if (byDom[da] && byDom[db]) galaxyArcs.push({ a: byDom[da], b: byDom[db], w });
  }
}
const galaxyArcs = [];

// --- Branch layout: one domain's resources, local level rows ---
function layoutBranch(domain, W, H) {
  const members = resources.map((n,i)=>({n,i})).filter(q => q.n.domain === domain);
  // rows by rounded local level, compacted
  const lvls = [...new Set(members.map(q => Math.round(q.n.lvl)))].sort((a,b)=>a-b);
  const rowOf = {}; lvls.forEach((lv, r) => rowOf[lv] = r);
  const rows = lvls.map(()=>[]);
  members.forEach(q => rows[rowOf[Math.round(q.n.lvl)]].push(q));
  rows.forEach(row => row.sort((a,b) => a.n.lvl - b.n.lvl || b.n.pri - a.n.pri));

  const CELLX = 150, CELLY = 118, HEXR = 26;
  const availW = W - SIDEBAR_W;
  const cx = SIDEBAR_W + availW/2;
  let y = 150;
  rows.forEach(row => {
    // wrap long rows
    const perRow = Math.max(1, Math.min(row.length, Math.floor((availW-80)/CELLX)));
    for (let k = 0; k < row.length; k += perRow) {
      const slice = row.slice(k, k+perRow);
      const w = slice.length * CELLX;
      slice.forEach((q, ci) => {
        q.n._x = cx - w/2 + ci*CELLX + CELLX/2;
        q.n._y = y;
        q.n._r = HEXR;
      });
      y += CELLY;
    }
  });
  return { members, height: y };
}

// --- Goal pathfinding (cycle-safe backward walk) ---
function computeGoal(idx) {
  const needed = new Set();
  const visited = new Set();
  (function walk(i) {
    if (visited.has(i)) return;
    visited.add(i);
    for (const t of resources[i].prereqResources) {
      const j = titleToIdx[t];
      if (j === undefined || resources[j]._st === 'done') continue;
      needed.add(j);
      walk(j);
    }
  })(idx);
  needed.add(idx);
  // Topo order over induced subgraph; cycle leftovers by level
  const arr = [...needed];
  const indeg = new Map(arr.map(i=>[i,0]));
  const adj = new Map(arr.map(i=>[i,[]]));
  for (const i of arr) {
    for (const t of resources[i].prereqResources) {
      const j = titleToIdx[t];
      if (j !== undefined && needed.has(j)) { adj.get(j).push(i); indeg.set(i, indeg.get(i)+1); }
    }
  }
  const q = arr.filter(i => indeg.get(i) === 0).sort((a,b) => resources[a].lvl - resources[b].lvl);
  const order = [];
  while (q.length) {
    const c = q.shift();
    order.push(c);
    for (const d of adj.get(c)) {
      indeg.set(d, indeg.get(d)-1);
      if (indeg.get(d) === 0) q.push(d);
    }
  }
  arr.sort((a,b) => resources[a].lvl - resources[b].lvl).forEach(i => { if (!order.includes(i)) order.push(i); });
  return { target: idx, set: needed, order };
}

function setGoal(idx) {
  goal = computeGoal(idx);
  buildSheet();
  // The quest route is a cross-domain object — show it on the world map
  enterGalaxy();
}
function clearGoal() { goal = null; galaxySats = []; buildSheet(); requestDraw(); }
window.setGoal = setGoal;
window.clearGoal = clearGoal;

let cam = { x: 0, y: 0, z: 1 };

function enterGalaxy() {

// --- Character sheet ---
function buildSheet() {
  const done = doneRes.length;
  let h = '';
  h += `<div class="lvl-row"><span class="lvl-num">Lv ${LV.lvl}</span><span class="lvl-label">Learner</span><span class="lvl-total"><b>${earnedXP.toLocaleString()}</b> XP</span></div>`;
  h += `<div class="xpbar"><div class="xpbar-fill" style="width:${Math.round(LV.into/LV.need*100)}%"></div></div>`;
  h += `<div class="xp-hint">${LV.into} / ${LV.need} XP to Lv ${LV.lvl+1} · ${done}/${resources.length} unlocked</div>`;

  // Active goal card
  if (goal) {
    const t = resources[goal.target];
    const remaining = goal.order.filter(i => resources[i]._st !== 'done');
    const totalXP = remaining.reduce((s,i) => s + resources[i]._xp, 0);
    h += `<div class="sheet-sec"><div class="sheet-title">🎯 Goal Path <span class="clear" onclick="clearGoal()">clear ✕</span></div>`;
    h += `<div class="goal-card">
      <div class="g-title">${t.title}</div>
      <div class="g-meta">${remaining.length} step${remaining.length>1?'s':''} · +${totalXP.toLocaleString()} XP · ${domTheme(t.domain).name}</div>`;
    let nextMarked = false;
    goal.order.forEach((i, k) => {
      const r = resources[i];
      const isDone = r._st === 'done';
      let cls = isDone ? 'gs-done' : '';
      if (!isDone && !nextMarked) { cls = 'gs-next'; nextMarked = true; }
      h += `<div class="goal-step ${cls}" data-idx="${i}"><span class="gs-n">${k+1}</span><span class="gs-t">${isDone?'✓ ':''}${r.title}</span></div>`;
    });
    h += `</div></div>`;
  }

  h += `<div class="sheet-sec"><div class="sheet-title">⚔ Quest Log</div>`;
  continueQ.slice(0,2).forEach(q => {
    h += `<div class="quest q-continue" data-idx="${q.i}">
      <div class="q-kind">Continue</div>
      <div class="q-title">${q.n.title}</div>
      <div class="q-meta"><span>${domTheme(q.n.domain).name}</span><span class="q-xp">+${q.n._xp} XP</span></div>
      <div class="qbar"><div class="qbar-fill" style="width:${q.n.prog}%"></div></div>
    </div>`;
  });
  newQ.forEach(q => {
    const why = unlockCount[q.i] > 0 ? `unlocks ${unlockCount[q.i]}` : (q.n.pri >= 45 ? 'high priority' : q.n.complexity || '');
    h += `<div class="quest q-new" data-idx="${q.i}">
      <div class="q-kind">New Quest</div>
      <div class="q-title">${q.n.title}</div>
      <div class="q-meta"><span>${domTheme(q.n.domain).name}</span><span>${why}</span><span class="q-xp">+${q.n._xp} XP</span></div>
    </div>`;
  });
  if (unlockQ) {
    h += `<div class="quest q-unlock" data-idx="${unlockQ.finishIdx}">
      <div class="q-kind">🔓 Unlock Path</div>
      <div class="q-title">${unlockQ.finish.title}</div>
      <div class="q-meta"><span>opens: ${unlockQ.opens.title.slice(0,32)}${unlockQ.opens.title.length>32?'…':''}</span></div>
    </div>`;
  }
  h += `</div>`;

  const sortedDoms = Object.entries(domStats).sort((a,b) => (b[1].done/b[1].total) - (a[1].done/a[1].total) || b[1].total - a[1].total);
  h += `<div class="sheet-sec"><div class="sheet-title">Branch Ranks</div>`;
  sortedDoms.forEach(([d, s]) => {
    const theme = domTheme(d);
    const [r,g,b] = theme.c;
    const rank = rankOf(s.done / s.total);
    h += `<div class="rank-row" data-dom="${d}">
      <div class="rank-dot" style="background:rgb(${r},${g},${b})"></div>
      <div class="rank-name">${theme.name}</div>
      <div class="rank-title" style="color:${rank.c}">${rank.t}</div>
      <div class="rank-frac">${s.done}/${s.total}</div>
    </div>`;
  });
  h += `</div>`;

  const unlocked = ACH.filter(a => a.ok).length;
  h += `<div class="sheet-sec"><div class="sheet-title">Achievements <span class="cnt">${unlocked}/${ACH.length}</span></div><div class="ach-grid">`;
  ACH.forEach(a => { h += `<div class="ach ${a.ok?'':'locked'}" title="${a.name} — ${a.desc}">${a.icon}</div>`; });
  h += `</div></div>`;

  const sheet = document.getElementById('sheet');
  sheet.innerHTML = h;
  sheet.querySelectorAll('.quest, .goal-step').forEach(el => {
    el.addEventListener('click', () => flyToIdx(parseInt(el.dataset.idx)));
  });
  sheet.querySelectorAll('.rank-row').forEach(el => {
    el.addEventListener('click', () => enterBranch(el.dataset.dom));
  });
}

function flyToIdx(idx) {
  const n = resources[idx];
  if (view.mode !== 'branch' || view.domain !== n.domain) enterBranch(n.domain);
  // center on node
  cam.x = SIDEBAR_W + (W - SIDEBAR_W)/2 - n._x * cam.z;
  cam.y = 44 + (H - 44)/2 - n._y * cam.z;
  openPanel(n);
  requestDraw();
}

// --- Drawing ---
function draw() {
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(cam.x, cam.y);
  ctx.scale(cam.z, cam.z);
  if (view.mode === 'galaxy') drawGalaxy();
  else drawBranch();
  ctx.restore();
}

function drawGalaxy() {
  // Arcs
  for (const arc of galaxyArcs) {
    ctx.beginPath();
    ctx.moveTo(arc.a.x, arc.a.y);
    ctx.lineTo(arc.b.x, arc.b.y);
    ctx.strokeStyle = `rgba(255,255,255,${0.02 + Math.min(arc.w/40, 0.06)})`;
    ctx.lineWidth = 1 + Math.log2(arc.w);
    ctx.stroke();
  }
  // Goal: gold ring on orbs containing path members
  const goalDoms = goal ? new Set([...goal.set].map(i => resources[i].domain)) : null;

  for (const g of galaxyNodes) {
    const theme = domTheme(g.domain);
    const [r,gg,b] = theme.c;
    const frac = g.done / g.total;
    const rank = rankOf(frac);
    const isHov = hoveredOrb === g;
    const dimmed = searchQ && !resources.some(n => n.domain === g.domain && n.title.toLowerCase().includes(searchQ));
    ctx.globalAlpha = dimmed ? 0.15 : 1;

    // Glow by rank
    if (frac > 0) {
      ctx.shadowColor = `rgba(${r},${gg},${b},${isHov ? 0.5 : 0.22})`;
      ctx.shadowBlur = isHov ? 34 : 18;
    }

    // Orb body
    ctx.beginPath();
    ctx.arc(g.x, g.y, g.r, 0, Math.PI*2);
    const grad = ctx.createRadialGradient(g.x - g.r*0.3, g.y - g.r*0.3, 0, g.x, g.y, g.r);
    grad.addColorStop(0, `rgba(${r},${gg},${b},${0.16 + frac*0.2})`);
    grad.addColorStop(1, `rgba(${r},${gg},${b},0.04)`);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = `rgba(${r},${gg},${b},${isHov ? 0.75 : 0.3})`;
    ctx.lineWidth = isHov ? 2 : 1;
    ctx.stroke();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

    // Progress fill ring
    if (frac > 0) {
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.r + 6, -Math.PI/2, -Math.PI/2 + Math.PI*2*frac);
      ctx.strokeStyle = `rgba(${r},${gg},${b},0.85)`;
      ctx.lineWidth = 3.5;
      ctx.stroke();
    }
    // In-progress tick
    if (g.prog > 0) {
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.r + 6, -Math.PI/2 + Math.PI*2*frac, -Math.PI/2 + Math.PI*2*(frac + g.prog/g.total));
      ctx.strokeStyle = 'rgba(240,136,62,0.7)';
      ctx.lineWidth = 3.5;
      ctx.stroke();
    }

    // Goal highlight
    if (goalDoms && goalDoms.has(g.domain)) {
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.r + 12, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(227,179,65,0.55)';
      ctx.setLineDash([5,5]);
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Labels
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `700 ${Math.max(11, g.r/3.4)}px Inter`;
    ctx.fillStyle = 'rgba(230,237,243,0.85)';
    ctx.fillText(`${g.done}/${g.total}`, g.x, g.y - 6);
    ctx.font = '700 8px Inter';
    ctx.fillStyle = rank.c;
    ctx.fillText(rank.t, g.x, g.y + 10);

    ctx.font = '600 11px Inter';
    ctx.fillStyle = `rgba(${r},${gg},${b},0.85)`;
    ctx.fillText(theme.name, g.x, g.y + g.r + 20);

    ctx.globalAlpha = 1;
  }

  // --- Quest satellites: goal-path nodes materialized on the world map ---
  galaxySats = [];
  const byDom = {};
  galaxyNodes.forEach(g => byDom[g.domain] = g);

  if (goal) {
    // Group consecutive positions per domain so multiple steps fan around their orb
    const perDomCount = {}, perDomSeen = {};
    goal.order.forEach(i => {
      const d = resources[i].domain;
      perDomCount[d] = (perDomCount[d] || 0) + 1;
    });

    goal.order.forEach((i, k) => {
      const n = resources[i];
      const orb = byDom[n.domain];
      if (!orb) return;
      // Face the neighboring step's orb so the chain flows between branches
      let refOrb = null;
      for (let j = k+1; j < goal.order.length; j++) {
        const o = byDom[resources[goal.order[j]].domain];
        if (o && o !== orb) { refOrb = o; break; }
      }
      if (!refOrb) for (let j = k-1; j >= 0; j--) {
        const o = byDom[resources[goal.order[j]].domain];
        if (o && o !== orb) { refOrb = o; break; }
      }
      let baseAngle = refOrb ? Math.atan2(refOrb.y - orb.y, refOrb.x - orb.x) : -Math.PI/2;
      const m = perDomCount[n.domain];
      const idx = (perDomSeen[n.domain] = (perDomSeen[n.domain] || 0) + 1) - 1;
      const spread = (idx - (m-1)/2) * 0.55;
      const angle = baseAngle + spread;
      const dist = orb.r + 38;
      galaxySats.push({ i, step: k+1, x: orb.x + dist*Math.cos(angle), y: orb.y + dist*Math.sin(angle), r: goal.target === i ? 18 : 14 });
    });

    // Gold chain connecting the steps in reading order
    for (let k = 0; k < galaxySats.length - 1; k++) {
      const a = galaxySats[k], b = galaxySats[k+1];
      const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
      const dx = b.x-a.x, dy = b.y-a.y;
      const dist = Math.sqrt(dx*dx+dy*dy)||1;
      const bow = Math.min(30, dist*0.15);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.quadraticCurveTo(mx - dy/dist*bow, my + dx/dist*bow, b.x, b.y);
      ctx.strokeStyle = 'rgba(227,179,65,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
      // direction arrowhead at midpoint
      const ang = Math.atan2(b.y-a.y, b.x-a.x);
      ctx.beginPath();
      ctx.moveTo(mx + 5*Math.cos(ang), my + 5*Math.sin(ang));
      ctx.lineTo(mx - 4*Math.cos(ang-0.5), my - 4*Math.sin(ang-0.5));
      ctx.lineTo(mx - 4*Math.cos(ang+0.5), my - 4*Math.sin(ang+0.5));
      ctx.closePath();
      ctx.fillStyle = 'rgba(227,179,65,0.6)';
      ctx.fill();
    }

    // Satellite hexes
    for (const s of galaxySats) {
      const n = resources[s.i];
      const isTarget = goal.target === s.i;
      const isDone = n._st === 'done';
      ctx.shadowColor = 'rgba(227,179,65,0.35)';
      ctx.shadowBlur = isTarget ? 20 : 10;
      drawHex(ctx, s.x, s.y, s.r);
      ctx.fillStyle = isDone ? 'rgba(63,185,80,0.18)' : 'rgba(227,179,65,0.14)';
      ctx.fill();
      ctx.strokeStyle = isDone ? 'rgba(63,185,80,0.7)' : 'rgba(227,179,65,0.75)';
      ctx.lineWidth = isTarget ? 2 : 1.3;
      ctx.stroke();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      if (isDone) { ctx.fillStyle = '#3fb950'; ctx.font = '700 11px Inter'; ctx.fillText('✓', s.x, s.y); }
      else if (isTarget) { ctx.font = '400 12px Inter'; ctx.fillText('🎯', s.x, s.y); }
      else {
        const icons = { paper:'📄', article:'📝', video:'🎬', docs:'📚', tweet:'🐦' };
        ctx.font = '400 10px Inter';
        ctx.fillText(icons[n.type] || '📄', s.x, s.y);
      }
      // Step badge
      ctx.beginPath();
      ctx.arc(s.x - s.r + 1, s.y - s.r + 1, 7, 0, Math.PI*2);
      ctx.fillStyle = isDone ? 'rgba(63,185,80,0.9)' : '#e3b341';
      ctx.fill();
      ctx.fillStyle = '#0a0c10';
      ctx.font = '800 8px Inter';
      ctx.fillText(String(s.step), s.x - s.r + 1, s.y - s.r + 1.5);
      // Label
      ctx.font = '500 8.5px Inter';
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fillText(truncText(n.title, 18), s.x, s.y + s.r + 11);
    }
  } else if (topPickIdx >= 0) {
    // No goal: pin the ★ NEXT pick to the world map as a single satellite
    const n = resources[topPickIdx];
    const orb = byDom[n.domain];
    if (orb) {
      const s = { i: topPickIdx, step: 0, x: orb.x, y: orb.y - orb.r - 34, r: 15 };
      galaxySats.push(s);
      ctx.shadowColor = 'rgba(227,179,65,0.4)';
      ctx.shadowBlur = 14;
      drawHex(ctx, s.x, s.y, s.r);
      ctx.fillStyle = 'rgba(227,179,65,0.14)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(227,179,65,0.8)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const icons = { paper:'📄', article:'📝', video:'🎬', docs:'📚', tweet:'🐦' };
      ctx.font = '400 10px Inter';
      ctx.fillText(icons[n.type] || '📄', s.x, s.y);
      ctx.font = '800 8px Inter';
      ctx.fillStyle = '#e3b341';
      ctx.fillText('★ NEXT', s.x, s.y - s.r - 9);
      ctx.font = '500 8.5px Inter';
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fillText(truncText(n.title, 18), s.x, s.y + s.r + 11);
    }
  }
}

function drawBranch() {
  const { members } = branchData;
  const theme = domTheme(view.domain);
  const [dr,dg,db] = theme.c;

  // Branch title
  const s = domStats[view.domain];
  const rank = rankOf(s.done/s.total);
  const cx = SIDEBAR_W + (W - SIDEBAR_W)/2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '800 20px Inter';
  ctx.fillStyle = `rgba(${dr},${dg},${db},0.9)`;
  ctx.fillText(theme.name.toUpperCase(), (cx - cam.x)/cam.z, (74 - cam.y)/cam.z);
  ctx.font = '700 10px Inter';
  ctx.fillStyle = rank.c;
  ctx.fillText(`${rank.t} · ${s.done}/${s.total}`, (cx - cam.x)/cam.z, (94 - cam.y)/cam.z);

  const idxSet = new Set(members.map(q => q.i));
  const hovIdx = hovered ? resources.indexOf(hovered) : -1;

  // Local edges (within branch)
  for (const e of edges) {
    if (!idxSet.has(e.from) || !idxSet.has(e.to)) continue;
    const a = resources[e.from], b = resources[e.to];
    const isHov = hovIdx >= 0 && (e.from === hovIdx || e.to === hovIdx);
    const inGoal = goal && goal.set.has(e.from) && goal.set.has(e.to);
    ctx.beginPath();
    const ax = a._x, ay = a._y + a._r + 3;
    const bx = b._x, by = b._y - b._r - 10;
    const my = (ay+by)/2;
    ctx.moveTo(ax, ay);
    ctx.bezierCurveTo(ax, my, bx, my, bx, by);
    if (inGoal) { ctx.strokeStyle = 'rgba(227,179,65,0.6)'; ctx.lineWidth = 2; }
    else if (isHov) { const sc = SC[hovered._st]; const [hr,hg,hb] = sc.glow||[88,166,255]; ctx.strokeStyle = `rgba(${hr},${hg},${hb},0.5)`; ctx.lineWidth = 2; }
    else { ctx.strokeStyle = 'rgba(255,255,255,0.09)'; ctx.lineWidth = 1; }
    ctx.stroke();
  }

  // Nodes
  for (const q of members) {
    const n = q.n, i = q.i;
    const sc = SC[n._st];
    const dim = (searchQ && !n.title.toLowerCase().includes(searchQ)) || (goal && !goal.set.has(i) && goal.set.size > 0 && !goal.set.has(i));
    const inGoal = goal && goal.set.has(i);
    const isHov = hovered === n;
    const isTop = i === topPickIdx;

    ctx.globalAlpha = (goal && !inGoal) ? 0.15 : dim ? 0.1 : 1;

    if ((isHov || isTop || inGoal || n._st === 'done') && !dim) {
      const glow = inGoal ? [227,179,65] : (isTop ? [227,179,65] : (sc.glow || [88,166,255]));
      ctx.shadowColor = `rgba(${glow[0]},${glow[1]},${glow[2]},${isHov ? 0.5 : 0.25})`;
      ctx.shadowBlur = isHov ? 26 : 14;
    }

    drawHex(ctx, n._x, n._y, n._r + (isHov ? 3 : 0));
    if (n._st === 'done') {
      const grad = ctx.createRadialGradient(n._x, n._y, 0, n._x, n._y, n._r);
      grad.addColorStop(0, `rgba(${dr},${dg},${db},0.32)`);
      grad.addColorStop(1, `rgba(${dr},${dg},${db},0.12)`);
      ctx.fillStyle = grad;
    } else if (n._st === 'progress') ctx.fillStyle = `rgba(${dr},${dg},${db},0.16)`;
    else if (n._st === 'ready') ctx.fillStyle = `rgba(${dr},${dg},${db},0.08)`;
    else ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.fill();

    if (inGoal) ctx.strokeStyle = 'rgba(227,179,65,0.8)';
    else if (n._st === 'done') ctx.strokeStyle = `rgba(63,185,80,${isHov?0.8:0.5})`;
    else if (n._st === 'progress') ctx.strokeStyle = `rgba(240,136,62,${isHov?0.8:0.5})`;
    else if (n._st === 'ready') ctx.strokeStyle = `rgba(88,166,255,${isHov?0.6:0.3})`;
    else ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = inGoal || isHov ? 2 : 1;
    ctx.stroke();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

    if (isTop && !goal) {
      drawHex(ctx, n._x, n._y, n._r + 8);
      ctx.strokeStyle = 'rgba(227,179,65,0.7)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.font = '800 9px Inter'; ctx.textAlign = 'center';
      ctx.fillStyle = '#e3b341';
      ctx.fillText('★ NEXT', n._x, n._y - n._r - 16);
    }
    if (goal && goal.target === i) {
      ctx.font = '800 9px Inter'; ctx.textAlign = 'center';
      ctx.fillStyle = '#e3b341';
      ctx.fillText('🎯 GOAL', n._x, n._y - n._r - 16);
    }

    if (n._st === 'progress' && n.prog > 0) {
      ctx.beginPath();
      ctx.arc(n._x, n._y, n._r + 6, -Math.PI/2, -Math.PI/2 + Math.PI*2*(n.prog/100));
      ctx.strokeStyle = '#f0883e';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (n._st === 'done') { ctx.fillStyle = '#3fb950'; ctx.font = '700 15px Inter'; ctx.fillText('✓', n._x, n._y); }
    else if (n._st === 'blocked') { ctx.fillStyle = 'rgba(255,255,255,0.14)'; ctx.font = '400 12px Inter'; ctx.fillText('🔒', n._x, n._y); }
    else {
      const icons = { paper:'📄', article:'📝', video:'🎬', docs:'📚', tweet:'🐦' };
      ctx.font = '400 14px Inter';
      ctx.fillText(icons[n.type] || '📄', n._x, n._y);
    }

    // Two-line label
    ctx.font = '500 9.5px Inter';
    ctx.fillStyle = n._st==='blocked' ? 'rgba(255,255,255,0.22)' : n._st==='done' ? 'rgba(255,255,255,0.6)' : sc.text;
    const words = n.title.split(' ');
    let l1 = '', l2 = '';
    for (const w of words) {
      if ((l1 + ' ' + w).trim().length <= 20 && !l2) l1 = (l1 + ' ' + w).trim();
      else l2 = (l2 + ' ' + w).trim();
    }
    if (l2.length > 20) l2 = l2.slice(0, 19) + '…';
    ctx.fillText(l1, n._x, n._y + n._r + 13);
    if (l2) ctx.fillText(l2, n._x, n._y + n._r + 24);

    // Cross-branch pips
    const cds = new Set();
    edges.forEach(e => {
      if (e.from === i && resources[e.to].domain !== n.domain) cds.add(resources[e.to].domain);
      if (e.to === i && resources[e.from].domain !== n.domain) cds.add(resources[e.from].domain);
    });
    [...cds].slice(0,3).forEach((d, k) => {
      const [pr,pg,pb] = domTheme(d).c;
      ctx.beginPath();
      ctx.arc(n._x + n._r - k*8, n._y - n._r + 2, 3, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${pr},${pg},${pb},0.9)`;
      ctx.fill();
      ctx.strokeStyle = 'rgba(10,12,16,0.8)';
      ctx.lineWidth = 1;
      ctx.stroke();
    });

    ctx.globalAlpha = 1;
  }
}

function drawHex(ctx, cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI/3*i - Math.PI/6;
    const x = cx + r*Math.cos(a), y = cy + r*Math.sin(a);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function truncText(t, m) { return t.length > m ? t.slice(0, m-1) + '…' : t; }

function hitTest(ex, ey) {
  if (ex < SIDEBAR_W) return null;
  const wx = (ex-cam.x)/cam.z, wy = (ey-cam.y)/cam.z;
  if (view.mode === 'galaxy') {
    for (const s of galaxySats) {
      const dx = wx-s.x, dy = wy-s.y;
      if (dx*dx + dy*dy <= (s.r+5)*(s.r+5)) return { node: resources[s.i] };
    }
    for (const g of galaxyNodes) {
      const dx = wx-g.x, dy = wy-g.y;
      if (dx*dx + dy*dy <= (g.r+8)*(g.r+8)) return { orb: g };
    }
    return null;
  }
  for (const q of branchData.members) {
    const n = q.n;
    const dx = wx-n._x, dy = wy-n._y;
    if (dx*dx + dy*dy <= (n._r+6)*(n._r+6)) return { node: n };
  }
  return null;
}

// --- Detail panel ---
function buildPanel(node) {
  const sc = SC[node._st];
  const theme = domTheme(node.domain);
  const nodeIdx = resources.indexOf(node);
  let h = `<button class="close-btn" onclick="closePanel()">&times;</button>`;
  h += `<h3 style="color:${sc.text}">${node.title}</h3>`;
  h += '<div class="pills">';
  h += `<span class="pill xp">+${node._xp} XP</span>`;
  [node.type, node.complexity, node.engagement, node._st].filter(Boolean).forEach(t => h+=`<span class="pill">${t}</span>`);
  h += '</div>';
  if (node._st !== 'done') {
    h += `<button class="goal-btn" onclick="setGoal(${nodeIdx})">🎯 Set as goal</button><br/>`;
  }
  h += `<div class="info"><b>Branch</b> ${theme.name}</div>`;
  if (node.topic) h += `<div class="info"><b>Topic</b> ${node.topic}</div>`;
  if (node.pri) h += `<div class="info"><b>Priority</b> ${node.pri}/100</div>`;
  if (node._cov !== undefined) h += `<div class="info"><b>Prerequisites met</b> ${Math.round(node._cov*100)}%</div>`;
  if (node._st === 'progress' && node.prog) {
    h += `<div class="pbar"><div class="pfill" style="width:${node.prog}%;background:${sc.fill}"></div></div>`;
  }
  const req = edges.filter(e => e.to === nodeIdx);
  if (req.length) {
    h += '<div class="section"><div class="section-title">Requires</div><div class="concept-list">';
    req.forEach(e => {
      const o = resources[e.from];
      const d = o._st === 'done';
      h += `<span class="${d?'concept-known':'concept-gap'}">${d?'✓':'○'} ${o.title}</span><br/>`;
    });
    h += '</div></div>';
  }
  const unlocks = edges.filter(e => e.from === nodeIdx);
  if (unlocks.length) {
    h += '<div class="section"><div class="section-title">Unlocks</div><div class="concept-list">';
    unlocks.forEach(e => h += `${resources[e.to].title}<br/>`);
    h += '</div></div>';
  }
  if (node.concepts.length) {
    h += '<div class="section"><div class="section-title">Skills gained</div><div class="concept-list">' + node.concepts.join(', ') + '</div></div>';
  }
  if (node.summary) h += `<div class="sum">${node.summary}</div>`;
  return h;
}
function openPanel(n) { pinned = n; hovered = n; panelEl.innerHTML = buildPanel(n); panelEl.classList.add('open'); requestDraw(); }
function closePanel() { pinned = null; hovered = null; panelEl.classList.remove('open'); requestDraw(); }
window.closePanel = closePanel;

// --- Interaction ---
let dragStart = null, dragging = false, drawPending = false;
function requestDraw() { if (drawPending) return; drawPending = true; requestAnimationFrame(() => { drawPending = false; draw(); }); }

canvas.addEventListener('wheel', ev => {
  ev.preventDefault();
  const s = ev.deltaY > 0 ? 0.93 : 1.07;
  cam.z *= s;
  cam.x = ev.clientX - (ev.clientX - cam.x)*s;
  cam.y = ev.clientY - (ev.clientY - cam.y)*s;
  requestDraw();
});
canvas.addEventListener('mousedown', ev => { dragStart = { x: ev.clientX, y: ev.clientY, cx: cam.x, cy: cam.y }; dragging = false; });
canvas.addEventListener('mousemove', ev => {
  if (dragStart && !dragging && (Math.abs(ev.clientX-dragStart.x)>4 || Math.abs(ev.clientY-dragStart.y)>4)) {
    dragging = true; canvas.classList.add('grabbing');
  }
  if (dragging && dragStart) {
    cam.x = dragStart.cx + (ev.clientX - dragStart.x);
    cam.y = dragStart.cy + (ev.clientY - dragStart.y);
    requestDraw(); return;
  }
  const hit = hitTest(ev.clientX, ev.clientY);
  const newHovOrb = hit && hit.orb ? hit.orb : null;
  const newHov = hit && hit.node ? hit.node : null;
  if (newHov !== hovered || newHovOrb !== hoveredOrb) {
    if (!pinned) hovered = newHov;
    hoveredOrb = newHovOrb;
    requestDraw();
  }
  canvas.style.cursor = hit ? 'pointer' : 'grab';

  if (newHovOrb) {
    const s = domStats[newHovOrb.domain];
    const rank = rankOf(s.done/s.total);
    tipEl.innerHTML = `<h3 style="color:rgb(${domTheme(newHovOrb.domain).c.join(',')})">${domTheme(newHovOrb.domain).name}</h3><div class="meta">${rank.t} · ${s.done}/${s.total} done${s.prog?` · ${s.prog} in progress`:''} · click to enter</div>`;
    tipEl.style.display = 'block';
    tipEl.style.left = Math.min(ev.clientX+16, W-300) + 'px';
    tipEl.style.top = (ev.clientY+16) + 'px';
  } else if (newHov && !pinned) {
    const sc = SC[newHov._st];
    tipEl.innerHTML = `<h3 style="color:${sc.text}">${newHov.title}</h3><div class="meta">${[newHov.topic, newHov._st].filter(Boolean).join(' · ')} · <span class="xp">+${newHov._xp} XP</span></div>`;
    tipEl.style.display = 'block';
    tipEl.style.left = Math.min(ev.clientX+16, W-300) + 'px';
    tipEl.style.top = (ev.clientY+16) + 'px';
  } else {
    tipEl.style.display = 'none';
  }
});
canvas.addEventListener('mouseup', ev => {
  const wasClick = !dragging && dragStart;
  dragStart = null; dragging = false; canvas.classList.remove('grabbing');
  if (!wasClick) return;
  const hit = hitTest(ev.clientX, ev.clientY);
  if (hit && hit.orb) { enterBranch(hit.orb.domain); tipEl.style.display = 'none'; }
  else if (hit && hit.node) { openPanel(hit.node); tipEl.style.display = 'none'; }
  else if (pinned) closePanel();
  else if (view.mode === 'branch') enterGalaxy();
});
canvas.addEventListener('mouseleave', () => { hoveredOrb = null; if (!pinned) { hovered = null; tipEl.style.display = 'none'; } requestDraw(); });
document.addEventListener('keydown', ev => {
  if (ev.key !== 'Escape') return;
  if (pinned) closePanel();
  else if (view.mode === 'branch') enterGalaxy();
});

document.getElementById('search').addEventListener('input', ev => { searchQ = ev.target.value.toLowerCase(); requestDraw(); });
document.getElementById('domainFilter').addEventListener('change', ev => { if (ev.target.value) enterBranch(ev.target.value); ev.target.value = ''; });

const allDomains = [...new Set(resources.map(n => n.domain))].sort();
const domSel = document.getElementById('domainFilter');
allDomains.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = domTheme(d).name; domSel.appendChild(o); });

window.addEventListener('resize', () => { resize(); init(); requestDraw(); });
resize();
document.fonts.ready.then(() => { init(); requestDraw(); });
</script>
</body>
</html>
