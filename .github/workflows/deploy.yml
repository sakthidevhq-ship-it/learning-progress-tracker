name: Build and Deploy Graph

on:
  push:
    branches: [main]
    paths:
      - 'vault/pages/**'
      - 'graph.html'
      - 'cli/build_graph.py'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build graph
        run: python cli/build_graph.py ./vault graph.html knowledge-graph.html

      - name: Prepare Pages
        run: |
          mkdir -p _site
          cp knowledge-graph.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
